<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tela dos editais</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
            <style>
            .editar{
                padding: 10px 20px;
                font-size: 18px;
                border: none;
                border-radius: 8px;
                background-color: black;
                color: white;
                cursor: pointer;
            }
            table {
            width: 50%;
            border-collapse: collapse;
            margin-top: 20px;
            }
            th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
            width: 300px;
            }
            th {
            background-color: #f2f2f2;
            }
            .links{
                margin-top: 10px;
            }
        </style>
    <body>
<div th:replace="~{fragments/layout :: custom-header}"></div>

<h3>Lista dos Motoristas</h3>

<table>
    <tr>
        <th>Nome</th>
        <th>Status</th>
    </tr>

    <tr th:each="f : ${motorista}">
        <td th:text="${f.nome}"></td>
        <td th:text="${f.status}"></td>
    </tr>
</table>
</body>
</html>
