<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <title>Tela para registrar usuário</title>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>

            body{
                margin: 0;
                padding: 0;
                height: 100vh;

                display: flex;
                justify-content: center;
                align-items: center;

                background-color: #f2f2f2;
                font-family: Arial, sans-serif;
            }

            .container{
                text-align: center;
            }

            h2{
                font-size: 40px;
                margin-bottom: 20px;
            }

            form{
                background-color: #999999;
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px rgba(0,0,0,0.3);

                width: 400px;
            }

            label{
                display: block;
                font-size: 22px;
                margin-top: 15px;
            }

            input{
                width: 100%;
                padding: 10px;
                margin-top: 5px;

                font-size: 18px;

                border-radius: 5px;
                border: 1px solid #ccc;

                box-sizing: border-box;
            }

            button{
                margin-top: 20px;
                padding: 10px 20px;

                font-size: 20px;

                color: white;
                background-color: black;

                border: none;
                border-radius: 10px;

                cursor: pointer;
            }

            button:hover{
                background-color: #333333;
            }


        </style>
    </head>
    <body>
        <div class="container">
          <h2>REGISTRAR</h2>

            <form th:action="@{/registrar}"
                  th:object="${user}"
                  method="post">

                <label>Nome:</label>
                <input type="text"
                       id="nome"
                       oninput="validarCadastro()"
                       th:field="*{nome}"
                       placeholder="Lambarildo"
                       required />

                <label>Email:</label>
                <input type="email"
                       id="email"
                       oninput="validarCadastro()"
                       th:field="*{email}"
                       placeholder="Lambarildo.peixe@hotmail.com"
                       required />

                <label>Senha:</label>
                <input type="password"
                       id="senha"
                       oninput="validarCadastro()"
                       th:field="*{senha}"
                       required />
                
                <label>Confirmar Senha:</label>
                <input type="password"
                       id="confirmar"
                       oninput="validarCadastro()"
                th:field="*{confirmarSenha}"
                required />
                
                <button type="submit"
                        id="botao"
                        disabled>
                    Cadastrar
                </button><br>
                <a href="/login"
                    class="btn">
                    <button type="button">
                        Voltar ao login
                    </button>
                </a>
            </form>
        </div>
         <script src="verificacao.js"></script>
    </body>
</html>
