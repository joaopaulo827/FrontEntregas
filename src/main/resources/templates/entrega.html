<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tela dos editais</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>        
    </head>
            <style>
            .editar{
                padding: 10px 20px;
                font-size: 18px;
                border: none;
                border-radius: 8px;
                background-color: black;
                color: white;
                cursor: pointer;
            }
            table {
            width: 50%;
            border-collapse: collapse;
            margin-top: 20px;
            }
            th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
            width: 300px;
            }
            th {
            background-color: #f2f2f2;
            }
            .links{
                margin-top: 10px;
            }
        </style>
    <body>
<div th:replace="~{fragments/layout :: custom-header}"></div>

<h3>Lista das Entregas</h3>

<table>
    <tr>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Status</th>
    </tr>
    <tr th:each="f : ${entrega}">
        <td th:text="${f.produto}"></td>
        <td th:text="${f.descricao}"></td>
        <td th:text="${f.status}"></td>
        <td>
        <a th:href="@{/entrega/editar(id=${f.id})}">Editar</a>
        </td>
    </tr>
</table>
</body>
</html>
