<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Editar Entrega</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </head>
    <body>
        <main>
            <h2>Editar Entrega</h2>
            <form th:action="@{/motorista/salvar}"th:object="${motorista}"method="post">
            <input type="hidden" th:field="*{id}" />
            
            <input type="hidden" th:field="*{usuario_id}" />
            
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" /><br>            
            
            <label>Status:</label>
            <input type="text" th:field="*{status}" /><br>
            
            <button type="submit">Salvar</button>
        </form>
        </main>
    </body>
</html>
